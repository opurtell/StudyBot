appId: com.studybot.clinical-recall
productName: StudyBot CMGs
directories:
  output: release/
files:
  - dist/**/*
  - src/electron/**/*
extraResources:
  - from: build/resources/backend
    to: backend
    filter:
      - "**/*"
  - from: config/settings.example.json
    to: config/settings.example.json
  - from: data/cmgs/structured
    to: data/cmgs/structured
    filter:
      - "**/*.json"
  - from: build/resources/data/services
    to: data/services
    filter:
      - "**/*"
mac:
  category: public.app-category.education
  hardenedRuntime: true
  identity: "-"
  entitlements: "build/entitlements.mac.plist"
  entitlementsInherit: "build/entitlements.mac.plist"
  artifactName: "StudyBot - ACTAS CMGs-${version}-${arch}.${ext}"
  target:
    - target: dmg
win:
  signingHashAlgorithms:
    - sha256
  artifactName: "StudyBot - ACTAS CMGs-${version}-${arch}.${ext}"
  target:
    - target: nsis
extraMetadata:
  displayName: "StudyBot CMGs"
asar: true
asarUnpack:
  - "**/*.node"
