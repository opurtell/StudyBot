name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0)"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: bash scripts/package-backend.sh arm64
      - run: bash scripts/verify-backend-payload.sh
      - run: npx vite build && npx electron-builder --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: release/**
          retention-days: 1

  build-mac-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: bash scripts/package-backend.sh x64
      - run: bash scripts/verify-backend-payload.sh
      - run: npx vite build && npx electron-builder --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: release/**
          retention-days: 1

  build-win-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: pwsh -File scripts/package-backend.ps1
      - run: pwsh -File scripts/verify-backend-payload.ps1
      - run: npx vite build && npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: release/**
          retention-days: 1

  draft-release:
    needs: [build-mac-arm64, build-mac-x64, build-win-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release-staging
          find release-artifacts -type f \( -name '*.dmg' -o -name 'StudyBot*.exe' \) ! -path '*/win-unpacked/*' -exec cp {} release-staging/ \;
          echo "Staged files:"
          ls -lh release-staging/
      - name: Determine version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            # For tag-triggered runs, extract from GITHUB_REF
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              VERSION="${GITHUB_REF#refs/tags/}"
            else
              VERSION="v$(date +%Y.%m.%d-%H%M)"
            fi
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          draft: true
          name: "Standard Build ${{ steps.version.outputs.tag }}"
          files: release-staging/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
