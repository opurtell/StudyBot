appId: com.studybot.personal
productName: StudyBot Personal
directories:
  output: release/
files:
  - dist/**/*
  - src/electron/**/*
extraResources:
  - from: build/resources/backend
    to: backend
    filter:
      - "**/*"
  - from: config/settings.example.json
    to: config/settings.example.json
  - from: build/resources/data/chroma_db
    to: data/chroma_db
    filter:
      - "**/*"
  - from: data/cmgs/structured
    to: data/cmgs/structured
    filter:
      - "**/*.json"
mac:
  category: public.app-category.education
  hardenedRuntime: true
  identity: "-"
  entitlements: "build/entitlements.mac.plist"
  entitlementsInherit: "build/entitlements.mac.plist"
  artifactName: "StudyBot - Personal Build-${version}-${arch}.${ext}"
  target:
    - target: dmg
win:
  signingHashAlgorithms:
    - sha256
  artifactName: "StudyBot - Personal Build-${version}-${arch}.${ext}"
  target:
    - target: nsis
asar: true
asarUnpack:
  - "**/*.node"
